<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1E1E1E;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .dashboard-card {
      background-color: #D9D9D9;
      width: 100%;
      max-width: 500px;
      height: 307px;
      border-radius: 4px;
      padding: 32px;
      margin: 16px;
    }

    .dashboard-card h1 {
      color: #FF0000;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.21;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <div class="dashboard-card">
    <h1>This is my demo dashboard</h1>
  </div>
</body>
</html>
